<div class="bg-white px-8 py-8 shadow-lg sm:rounded-xl max-w-2xl mx-auto border border-gray-100">
  <h2 class="text-3xl font-extrabold text-gray-900 mb-6 tracking-tight">Create Campaign</h2>
  
  <div class="space-y-6">
    <div>
      <label class="block text-sm font-semibold text-gray-700">Subject</label>
      <input type="text" [(ngModel)]="subject" class="mt-2 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-4 py-2 border transition duration-200" placeholder="e.g. Frontend Developer Application">
    </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">Email Body</label>
        <div class="bg-gray-50 border border-gray-200 rounded-lg p-3 my-2 shadow-sm relative">
          <span class="absolute top-0 right-0 transform translate-x-1.5 -translate-y-1.5 flex h-3 w-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span>
          </span>
          <p class="text-xs text-gray-700 font-medium mb-1 line-clamp-1">Personalize your emails with Dynamic Placeholders!</p>
          <p ngNonBindable class="text-[11px] text-gray-500 font-mono tracking-tight">Use <b class="text-indigo-600 bg-indigo-50 px-1 rounded">{{Greeting}}</b> (IST Morning/Afternoon), <b class="text-indigo-600 bg-indigo-50 px-1 rounded">{{Company}}</b>, or <b class="text-indigo-600 bg-indigo-50 px-1 rounded">{{Manager}}</b>.</p>
        </div>
        <textarea [(ngModel)]="body" rows="6" class="mt-2 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-4 py-2 border transition duration-200 font-mono" placeholder="Enter your email body here..."></textarea>
      </div>

    <div class="hidden">
      <!-- hidden input if needed to bind values or just removed -->
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700">Resume / Attachment</label>
      <input type="file" (change)="onFileSelected($event)" class="mt-2 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition duration-200">
    </div>

    <div *ngIf="selectedFile">
      <label class="block text-sm font-semibold text-gray-700 mt-4">Resume Name (sent to HR)</label>
      <input type="text" [(ngModel)]="resumeName" class="mt-2 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-4 py-2 border transition duration-200" placeholder="e.g. John_Doe_Resume.pdf">
      <p class="text-xs text-gray-500 mt-1">This name will be visible to the HR when they receive the email attachment.</p>
    </div>
  </div>

  <div *ngIf="successMessage" class="mt-6 p-4 bg-green-50 rounded-md border border-green-200 text-green-800 font-medium select-all">
    {{ successMessage }}
  </div>

  <div *ngIf="errorMessage" class="mt-6 p-4 bg-red-50 rounded-md border border-red-200 text-red-800 font-medium">
    {{ errorMessage }}
  </div>

  <div class="mt-8 flex justify-end">
    <button (click)="submit()" [disabled]="isLoading" class="inline-flex justify-center py-2.5 px-6 border border-transparent shadow-md text-sm font-semibold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 transition duration-200">
      {{ isLoading ? 'Saving...' : 'Save Campaign' }}
    </button>
  </div>
</div>
